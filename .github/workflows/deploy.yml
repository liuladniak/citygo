name: Deploy CityGo to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          set -e
          cd /var/www/citygo
          git fetch origin main
          git reset --hard origin/main
          /usr/bin/docker compose up -d --build
          /usr/bin/docker image prune -f
