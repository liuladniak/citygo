services:
  # --- NEW RECEPTIONIST (Nginx Proxy Manager) ---
  nginx-proxy:
    image: "jc21/nginx-proxy-manager:latest"
    container_name: citygo-proxy
    restart: always
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt

  # --- YOUR APPS ---
  main-api:
    build: ./server
    container_name: citygo-api
    restart: always
    expose:
      - "8080"
    env_file:
      - .env

  ai-service:
    build: ./ai-service
    container_name: citygo-ai
    restart: always
    expose:
      - "80"
    env_file:
      - .env

  client-app:
    build:
      context: ./client
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_STRIPE_PUBLIC_KEY=${VITE_STRIPE_PUBLIC_KEY}
    container_name: citygo-client
    restart: always
    expose:
      - "80"

  admin-dashboard:
    build:
      context: ./dashboard
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: citygo-dashboard
    restart: always
    expose:
      - "80"
